<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>WatermarkIt</title>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="fish_icon.png" />
  <link rel="apple-touch-icon" href="fish_icon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-stone-50 text-[#5D4037] flex flex-col" style="height:100dvh;overflow:hidden;">

  <!-- ── Header ───────────────────────────────────────────────── -->
  <header class="flex-none flex items-center justify-between px-4 bg-white border-b border-stone-200 header-safe">
    <button id="btn-wm-upload"
      class="flex items-center gap-2 bg-stone-100 active:bg-stone-200 rounded-xl px-3 py-2.5 text-sm font-medium">
      <span id="wm-dot" class="w-2 h-2 rounded-full bg-stone-300 flex-none"></span>
      <span id="wm-label">Add Watermark</span>
    </button>
    <input id="input-wm" type="file" accept="image/*" class="hidden" />

    <div class="flex bg-stone-100 rounded-xl p-1 gap-0.5">
      <button id="btn-batch"
        class="mode-btn mode-active px-3 py-1.5 rounded-lg text-xs font-semibold">Batch</button>
      <button id="btn-single"
        class="mode-btn px-3 py-1.5 rounded-lg text-xs font-semibold text-[#A1887F]">Single</button>
    </div>
  </header>

  <!-- ── Preview ──────────────────────────────────────────────── -->
  <main class="flex-1 min-h-0 flex flex-col items-center justify-center px-4 py-3 gap-2">

    <!-- Empty state -->
    <div id="empty-state" class="flex flex-col items-center gap-3 text-[#A1887F]" style="display:flex;">
      <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828
             0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2
             2 0 002 2z"/>
      </svg>
      <p class="text-sm">Tap "Add Images" to begin</p>
    </div>

    <!-- Canvas wrap -->
    <div id="preview-wrap" class="w-full h-full flex-col items-center gap-2" style="display:none;">
      <div class="flex-1 min-h-0 w-full flex items-center justify-center">
        <canvas id="preview-canvas" class="max-w-full max-h-full rounded-xl shadow-lg block"></canvas>
      </div>
      <!-- Carousel nav -->
      <div id="carousel-nav" class="items-center gap-4 pb-1" style="display:none;">
        <button id="btn-prev"
          class="w-11 h-11 flex items-center justify-center bg-stone-200 active:bg-stone-300 rounded-full text-xl font-bold text-[#5D4037]">‹</button>
        <span id="carousel-label" class="text-sm text-[#5D4037] min-w-[4.5rem] text-center font-medium">1 / 1</span>
        <button id="btn-next"
          class="w-11 h-11 flex items-center justify-center bg-stone-200 active:bg-stone-300 rounded-full text-xl font-bold text-[#5D4037]">›</button>
      </div>
    </div>

  </main>

  <!-- ── Bottom Panel ──────────────────────────────────────────── -->
  <div class="flex-none bg-white border-t border-stone-200 bottom-safe">

    <!-- Action row -->
    <div class="flex gap-3 px-4 pt-3 pb-2">
      <button id="btn-add-images"
        class="flex-1 flex items-center justify-center gap-1.5 bg-stone-100 active:bg-stone-200 rounded-xl py-3 text-sm font-medium">
        <svg class="w-4 h-4 flex-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
        </svg>
        <span id="add-label">Add Images</span>
      </button>
      <input id="input-images" type="file" accept="image/*" multiple class="hidden" />

      <button id="btn-export"
        class="flex-1 flex items-center justify-center gap-1.5 bg-[#A1887F] active:bg-[#8D6E63] text-white rounded-xl py-3 text-sm font-semibold">
        <svg id="export-icon" class="w-4 h-4 flex-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0
               2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0
               105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0
               00-5.368-2.684z"/>
        </svg>
        <span id="export-label">Share</span>
      </button>
    </div>

    <!-- Controls -->
    <div class="px-4 pb-3 overflow-y-auto" style="max-height:230px;">
      <div class="flex gap-4 items-start">

        <!-- 9-grid snap -->
        <div class="flex-none">
          <p class="text-[10px] text-[#A1887F] mb-2 font-semibold uppercase tracking-wider">Snap</p>
          <div id="snap-grid" class="grid grid-cols-3 gap-1.5"></div>
        </div>

        <!-- Sliders -->
        <div class="flex-1 space-y-2.5 min-w-0">
          <div class="slider-row">
            <span class="ctrl-lbl">X</span>
            <div class="slider-wrap">
              <input id="sl-x" type="range" min="-50" max="50" value="0" class="slider">
            </div>
            <span id="val-x" class="ctrl-val">0</span>
          </div>
          <div class="slider-row">
            <span class="ctrl-lbl">Y</span>
            <div class="slider-wrap">
              <input id="sl-y" type="range" min="-50" max="50" value="0" class="slider">
            </div>
            <span id="val-y" class="ctrl-val">0</span>
          </div>
          <div class="slider-row">
            <span class="ctrl-lbl">Scale</span>
            <div class="slider-wrap">
              <input id="sl-scale" type="range" min="1" max="100" value="30" class="slider">
            </div>
            <span id="val-scale" class="ctrl-val">30%</span>
          </div>
          <div class="slider-row">
            <span class="ctrl-lbl">Opacity</span>
            <div class="slider-wrap">
              <input id="sl-opacity" type="range" min="0" max="100" value="70" class="slider">
            </div>
            <span id="val-opacity" class="ctrl-val">0.7</span>
          </div>
          <!-- Mode hint -->
          <p id="mode-hint" class="text-[10px] text-[#A1887F] pt-0.5">Adjusting: all images</p>
        </div>

      </div>
    </div>

  </div>

  <!-- ── Fallback Modal ────────────────────────────────────────── -->
  <div id="fallback-modal" class="fixed inset-0 z-50 flex-col bg-stone-50" style="display:none;">
    <div class="flex items-start justify-between px-4 py-3 border-b border-stone-200 header-safe">
      <div>
        <h2 class="font-semibold text-sm text-[#5D4037]">Save to Photos</h2>
        <p class="text-xs text-[#A1887F] mt-0.5">Long-press any image → "Save to Photos"</p>
      </div>
      <button id="btn-close-fallback"
        class="w-9 h-9 flex items-center justify-center rounded-full bg-stone-100 active:bg-stone-200 text-base ml-4 flex-none text-[#5D4037]">✕</button>
    </div>
    <div id="fallback-grid" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-3"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
